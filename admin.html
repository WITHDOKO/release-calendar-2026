<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 음원 발매 운영</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  :root{
    --bg:#0f1117; --panel:#171a23; --panel-2:#1e222e; --line:#2a2f3d; --line-2:#3a4152;
    --text:#e8eaf0; --text-dim:#9aa1b3; --text-mute:#6b7280;
    --lime:#6c8cff; --lime-dim:rgba(108,140,255,.15); --lime-text:#ffffff;
    --s-plan:#f5a623; --s-plan-bg:rgba(245,166,35,.16);
    --s-fix:#3ea6ff;  --s-fix-bg:rgba(62,166,255,.16);
    --s-done:#2ecc71; --s-done-bg:rgba(46,204,113,.16);
    --s-hold:#8b93a7; --s-hold-bg:rgba(139,147,167,.16);
    --star:#ffd84d;
    --font:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  html,body{ background:var(--bg); color:var(--text); font-family:var(--font); }
  body{ padding-bottom:50px; }
  button{ font-family:inherit; cursor:pointer; }
  select,input{ font-family:inherit; }

  /* ── 상단바 ── */
  .topbar{ position:sticky; top:0; z-index:50; background:rgba(11,15,10,.88); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line); padding:12px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .logo{ width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,#6c8cff,#a86cff); color:#fff;
    display:grid; place-items:center; font-weight:900; font-size:18px; box-shadow:0 4px 14px rgba(108,140,255,.4); }
  .brand h1{ font-size:16px; font-weight:800; letter-spacing:-.2px; }
  .brand p{ font-size:10px; color:var(--text-mute); letter-spacing:2.2px; margin-top:2px; }
  .sync-pill{ font-size:11px; color:var(--text-dim); background:var(--panel-2); border:1px solid var(--line);
    border-radius:20px; padding:5px 12px; display:inline-flex; align-items:center; gap:6px; }
  .sync-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--s-done); }
  .spacer{ flex:1; }
  .btn{ background:var(--panel-2); border:1px solid var(--line-2); color:var(--text); padding:9px 14px;
    border-radius:10px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:6px; transition:.15s; white-space:nowrap; }
  .btn:hover{ border-color:var(--lime); }
  .btn.lime{ background:var(--lime); border-color:var(--lime); color:var(--lime-text); font-weight:800; }
  .btn.lime:hover{ filter:brightness(1.06); }

  /* ── 히어로 (연간 현황) ── */
  .hero{ display:grid; grid-template-columns:1.3fr 1fr 1.4fr .9fr; gap:0; border-bottom:1px solid var(--line); }
  .hero>div{ padding:20px 24px; border-right:1px solid var(--line); }
  .hero>div:last-child{ border-right:none; }
  .hero .k{ font-size:11px; color:var(--lime); font-weight:700; margin-bottom:7px; letter-spacing:.3px; }
  .hero .today-line{ font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .hero h2{ font-size:21px; font-weight:800; letter-spacing:-.4px; }
  .next-date{ font-size:17px; font-weight:800; }
  .next-sub{ font-size:12px; color:var(--text-dim); margin-top:4px; }
  .goal-top{ display:flex; align-items:baseline; gap:10px; }
  .goal-top b{ font-size:19px; }
  .goal-top .pct{ font-size:12px; color:var(--lime); font-weight:700; }
  .goal-bar{ height:7px; background:var(--panel-2); border-radius:6px; margin:9px 0 10px; overflow:hidden; }
  .goal-bar i{ display:block; height:100%; background:var(--lime); border-radius:6px; transition:.3s; }
  .goal-dots{ display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--text-dim); }
  .goal-dots b{ color:var(--text); }
  .goal-dots .dt{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
  .toggle-wrap{ display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
  .toggle-label{ font-size:13px; font-weight:700; }
  .toggle-sub{ font-size:11px; color:var(--text-mute); }
  .switch{ width:44px; height:24px; border-radius:20px; background:var(--panel-2); border:1px solid var(--line-2);
    position:relative; transition:.2s; }
  .switch.on{ background:var(--lime); border-color:var(--lime); }
  .switch i{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.2s; }
  .switch.on i{ left:22px; }

  /* ── 필터 줄 ── */
  .filters-row{ display:flex; align-items:center; gap:12px; padding:14px 24px; flex-wrap:wrap; }
  .search{ position:relative; flex:1; min-width:220px; max-width:420px; }
  .search input{ width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:10px 12px 10px 36px; font-size:13px; outline:none; }
  .search input:focus{ border-color:var(--lime); }
  .search svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.45; }
  select.sel{ background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:10px;
    padding:9px 12px; font-size:13px; outline:none; }
  .count-note{ font-size:12px; color:var(--text-mute); margin-left:auto; }

  /* ── 뷰 탭 + 월 탭 ── */
  .viewtabs{ display:flex; align-items:center; gap:22px; padding:0 24px; border-bottom:1px solid var(--line); }
  .viewtab{ background:none; border:none; color:var(--text-dim); font-size:14px; font-weight:700; padding:12px 2px;
    border-bottom:2px solid transparent; }
  .viewtab.active{ color:var(--text); border-bottom-color:var(--lime); }
  .yearnav{ margin-left:auto; display:flex; align-items:center; gap:14px; font-size:14px; font-weight:700; color:var(--text-dim); }
  .yearnav button{ background:none; border:none; color:var(--text-dim); font-size:17px; }
  .yearnav button:hover{ color:var(--lime); }
  .month-tabs{ display:flex; gap:6px; flex-wrap:wrap; padding:12px 24px 2px; }
  .month-tab{ background:var(--panel-2); border:1px solid var(--line); color:var(--text-dim); border-radius:20px;
    padding:7px 13px; font-size:12px; font-weight:700; transition:.12s; }
  .month-tab:hover{ border-color:var(--lime); color:var(--text); }
  .month-tab.active{ background:var(--lime); border-color:var(--lime); color:var(--lime-text); }
  .month-tab.empty{ opacity:.45; }

  /* ── 업무 진행 (다가오는 5건) ── */
  .flow-head{ display:flex; align-items:baseline; gap:10px; padding:16px 24px 10px; }
  .flow-head .eyebrow{ font-size:10px; letter-spacing:2px; color:var(--lime); font-weight:800; }
  .flow-head h3{ font-size:15px; font-weight:800; }
  .flow-head .note{ margin-left:auto; font-size:11px; color:var(--text-mute); }
  .flow-strip{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; padding:0 24px 6px; }
  .flow-card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 13px; cursor:pointer; transition:.12s; }
  .flow-card:hover{ border-color:var(--line-2); transform:translateY(-1px); }
  .flow-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .flow-date{ font-size:12px; font-weight:800; color:var(--lime); }
  .flow-stage{ background:var(--panel-2); border:1px solid var(--line-2); color:var(--text); font-size:11px;
    border-radius:7px; padding:4px 6px; outline:none; }
  .flow-title{ font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .flow-sub{ font-size:11px; color:var(--text-dim); margin:3px 0 9px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .seg-row{ display:flex; align-items:center; gap:4px; }
  .seg{ flex:1; height:5px; border-radius:4px; background:var(--panel-2); }
  .seg.on{ background:var(--s-done); }
  .seg-num{ font-size:10px; color:var(--text-mute); margin-left:4px; }
  .flow-empty{ grid-column:1/-1; text-align:center; color:var(--text-mute); font-size:13px; padding:18px; }

  /* ── 일정 미정 ── */
  .tbd-panel{ margin:10px 24px 0; background:var(--panel); border:1px dashed var(--line-2); border-radius:12px; padding:12px 16px; }
  .tbd-panel h4{ font-size:12px; color:var(--s-hold); margin-bottom:8px; font-weight:800; }
  /* 변경 기록 */
  .log-panel{ margin:10px 24px 0; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 16px; }
  .log-panel h4{ font-size:12px; color:var(--lime); margin-bottom:8px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .log-panel h4 .cnt{ color:var(--text-mute); font-weight:600; }
  .log-list{ display:flex; flex-direction:column; gap:5px; max-height:132px; overflow:auto; }
  .log-row{ font-size:12px; color:var(--text-dim); display:flex; gap:8px; align-items:baseline; }
  .log-row .lt{ color:var(--text-mute); font-size:11px; flex:0 0 84px; }
  .log-row .lw{ color:var(--text); font-weight:700; flex:0 0 auto; }
  .log-row .la{ flex:0 0 auto; font-size:10px; font-weight:800; padding:1px 7px; border-radius:6px; }
  .la.add{ background:var(--s-done-bg); color:var(--s-done); } .la.mod{ background:var(--s-fix-bg); color:var(--s-fix); }
  .la.del{ background:rgba(255,128,128,.14); color:#ff8080; } .la.etc{ background:var(--s-plan-bg); color:var(--s-plan); }
  .tbd-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .tbd-item{ background:var(--s-hold-bg); border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; }
  .tbd-item b{ color:var(--text); } .tbd-item span{ color:var(--text-dim); }

  /* ── 캘린더 ── */
  .cal-wrap{ padding:12px 24px; }
  .weekdays{ display:grid; grid-template-columns:repeat(7,1fr); gap:7px; margin-bottom:7px; }
  .weekdays div{ text-align:center; font-size:12px; font-weight:700; color:var(--text-dim); padding:4px; }
  .weekdays div.sun{ color:#ff8080; } .weekdays div.sat{ color:#82b7ff; }
  .grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
  .cell{ background:var(--panel); border:1px solid var(--line); border-radius:11px; min-height:112px; padding:8px;
    display:flex; flex-direction:column; gap:5px; position:relative; transition:.12s; }
  .cell.other{ opacity:.3; }
  .cell.today{ border-color:var(--lime); box-shadow:0 0 0 1px var(--lime) inset; }
  .cell .num{ font-size:12px; font-weight:700; color:var(--text-dim); display:flex; justify-content:space-between; }
  .cell .holi{ font-size:10px; color:#ff8080; }
  .cell.sun .num{ color:#ff8080; } .cell.sat .num{ color:#82b7ff; }
  .cell .add-mini{ position:absolute; top:6px; right:6px; width:20px; height:20px; border-radius:6px; background:var(--panel-2);
    border:1px solid var(--line); color:var(--text-dim); font-size:13px; display:none; place-items:center; z-index:2; }
  .cell:hover .add-mini{ display:grid; }
  .cell .add-mini:hover{ color:var(--lime); border-color:var(--lime); }
  .event{ border-radius:8px; padding:5px 8px; font-size:12px; cursor:pointer; border-left:3px solid; background:var(--panel-2); transition:.12s; overflow:hidden; }
  .event:hover{ transform:translateY(-1px); }
  .event .ev-top{ display:flex; align-items:center; gap:4px; }
  .event .ev-time{ font-size:10px; font-weight:800; padding:1px 5px; border-radius:5px; background:rgba(255,255,255,.06); color:var(--text-dim); }
  .event .ev-artist{ font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .event .ev-title{ color:var(--text-dim); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .event .ev-meta{ display:flex; gap:5px; margin-top:3px; font-size:10px; color:var(--text-mute); }
  .event .star{ color:var(--star); }
  .event.plan{ border-color:var(--s-plan); } .event.fix{ border-color:var(--s-fix); }
  .event.done{ border-color:var(--s-done); opacity:.68; } .event.hold{ border-color:var(--s-hold); }

  /* ── 리스트 ── */
  .list-wrap{ padding:12px 24px; }
  .list-month{ margin-bottom:24px; }
  .list-month h3{ font-size:15px; font-weight:800; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--line); }
  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:12px; color:var(--text-dim); font-weight:700; padding:8px 12px; border-bottom:1px solid var(--line); }
  td{ padding:10px 12px; font-size:13px; border-bottom:1px solid var(--line); vertical-align:middle; }
  tr.row:hover{ background:var(--panel); cursor:pointer; }
  .pill{ display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .pill .dot{ width:7px; height:7px; border-radius:50%; }
  .pill.plan{ background:var(--s-plan-bg); color:var(--s-plan); } .pill.plan .dot{ background:var(--s-plan); }
  .pill.fix{ background:var(--s-fix-bg); color:var(--s-fix); } .pill.fix .dot{ background:var(--s-fix); }
  .pill.done{ background:var(--s-done-bg); color:var(--s-done); } .pill.done .dot{ background:var(--s-done); }
  .pill.hold{ background:var(--s-hold-bg); color:var(--s-hold); } .pill.hold .dot{ background:var(--s-hold); }
  .tag-label{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; background:var(--lime-dim); color:var(--lime); }
  .mini-seg{ display:inline-flex; gap:2px; vertical-align:middle; margin-right:6px; }
  .mini-seg i{ width:9px; height:5px; border-radius:3px; background:var(--panel-2); display:inline-block; }
  .mini-seg i.on{ background:var(--s-done); }

  /* ── 운영 브리핑 ── */
  .brief-wrap{ padding:16px 24px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .brief-card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }
  .brief-card h4{ font-size:13px; font-weight:800; color:var(--lime); margin-bottom:14px; }
  .big-num{ font-size:34px; font-weight:900; letter-spacing:-1px; }
  .big-sub{ font-size:12px; color:var(--text-dim); margin-top:4px; }
  .mbar-row{ display:flex; align-items:center; gap:10px; margin-bottom:7px; font-size:12px; }
  .mbar-row .ml{ width:34px; color:var(--text-dim); font-weight:700; }
  .mbar{ flex:1; height:14px; background:var(--panel-2); border-radius:5px; overflow:hidden; display:flex; }
  .mbar i{ display:block; height:100%; }
  .mbar .f-done{ background:var(--s-done); } .mbar .f-fix{ background:var(--s-fix); }
  .mbar .f-plan{ background:var(--s-plan); }
  .mbar-cnt{ width:24px; text-align:right; color:var(--text-dim); font-size:11px; }
  .brief-full{ grid-column:1/-1; }

  /* ── 모달 ── */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(3px); display:none; place-items:center; z-index:100; padding:20px; }
  .overlay.open{ display:grid; }
  .modal{ background:var(--panel); border:1px solid var(--line-2); border-radius:14px; width:100%; max-width:470px; padding:24px; max-height:92vh; overflow:auto; }
  .modal h2{ font-size:18px; margin-bottom:16px; font-weight:800; }
  .field{ margin-bottom:12px; }
  .field.row2{ display:flex; gap:10px; } .field.row2>div{ flex:1; }
  .field label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; font-weight:600; }
  .field input,.field select{ width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:9px; padding:10px 12px; font-size:13px; outline:none; }
  .field input:focus,.field select:focus{ border-color:var(--lime); }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .modal-actions .btn{ flex:1; justify-content:center; }
  .btn.danger{ color:#ff8080; border-color:transparent; background:transparent; flex:0 0 auto; }
  .btn.danger:hover{ background:rgba(255,128,128,.1); }

  .footer-note{ text-align:center; font-size:11px; color:var(--text-mute); padding:22px; line-height:1.7; }
  .hide{ display:none !important; }
  body.readonly .edit-only{ display:none !important; }
  body.readonly .cell .add-mini{ display:none !important; }

  @media (max-width:1100px){ .hero{ grid-template-columns:1fr 1fr; } .flow-strip{ grid-template-columns:repeat(2,1fr); } .brief-wrap{ grid-template-columns:1fr; } }
  @media (max-width:640px){ .hero{ grid-template-columns:1fr; } .flow-strip{ grid-template-columns:1fr; } .cell{ min-height:auto; } }
  @media print{ .topbar,.filters-row,.viewtabs,.month-tabs,.add-mini,.flow-stage{ display:none !important; }
    body{ background:#fff; color:#000; } .cell,.flow-card,.brief-card{ border-color:#ccc; background:#fff; } .event{ background:#f4f4f4; color:#000; opacity:1; } }
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:11px">
    <div class="logo">🎵</div>
    <div class="brand"><h1>음원 발매 운영</h1><p>2026 RELEASE OPERATIONS</p></div>
  </div>
  <span class="sync-pill"><span class="dot"></span><span id="syncStatus">로컬 편집 모드</span></span>
  <div class="spacer"></div>
  <button class="btn lime edit-only" onclick="openModal()">＋ 앨범 추가</button>
  <button class="btn" onclick="copyLink()">🔗 링크 복사</button>
  <button class="btn" onclick="exportCSV()">CSV</button>
  <button class="btn edit-only" onclick="exportData()" title="JSON 백업">⬇</button>
  <button class="btn edit-only" onclick="document.getElementById('importFile').click()" title="JSON 불러오기">⬆</button>
  <button class="btn" onclick="window.print()">🖨 인쇄 / PDF</button>
  <button class="btn lime edit-only" onclick="syncToPublic()">🌐 공개 반영</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- 히어로: 연간 현황 -->
<div class="hero">
  <div>
    <div class="today-line" id="todayLine"></div>
    <h2>2026 음원 발매 캘린더</h2>
  </div>
  <div>
    <div class="k">다음 발매</div>
    <div class="next-date" id="nextDate">-</div>
    <div class="next-sub" id="nextSub"></div>
  </div>
  <div>
    <div class="k">연간 진행도</div>
    <div class="goal-top">완료 <b id="goalNum">0/0</b><span class="pct" id="goalPct">0%</span></div>
    <div class="goal-bar"><i id="goalBar" style="width:0%"></i></div>
    <div class="goal-dots" id="goalDots"></div>
  </div>
  <div>
    <div class="k">표시 설정</div>
    <div class="toggle-wrap">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="switch on" id="doneSwitch" onclick="toggleDone()"><i></i></div>
        <span class="toggle-label">발매완료 포함</span>
      </div>
      <span class="toggle-sub" id="doneSub"></span>
    </div>
  </div>
</div>

<!-- 필터 -->
<div class="filters-row">
  <div class="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="searchInput" placeholder="아티스트·곡·메모·희망 시기 검색">
  </div>
  <select class="sel" id="artistFilter" onchange="render()"><option value="">전체 아티스트</option></select>
  <select class="sel" id="labelFilter" onchange="render()"><option value="">전체 레이블</option></select>
  <span class="count-note" id="countNote"></span>
</div>

<!-- 뷰 탭 -->
<div class="viewtabs">
  <button class="viewtab" id="tab-brief" onclick="setView('brief')">운영 브리핑</button>
  <button class="viewtab active" id="tab-cal" onclick="setView('cal')">월간 캘린더</button>
  <button class="viewtab" id="tab-list" onclick="setView('list')">전체 리스트</button>
  <div class="yearnav">
    <button onclick="changeMonth(-1)">←</button>
    <span id="ymLabel">2026년 7월</span>
    <button onclick="changeMonth(1)">→</button>
  </div>
</div>

<div class="month-tabs" id="monthTabs"></div>

<!-- 업무 진행 -->
<div id="flowSection">
  <div class="flow-head">
    <div><div class="eyebrow">UPCOMING WORKFLOW</div><h3>업무 진행</h3></div>
    <div class="note" id="flowNote">오늘 이후 5건 · 단계 변경 시 자동 저장</div>

/* 모드: 공개 링크=보기 전용 / admin.html=관리자(인증 필요) / 로컬 파일=소유자 편집 */
const IS_ADMIN=/admin/i.test(location.pathname);
const ON_WEB=location.hostname.endsWith('github.io');
const READONLY=ON_WEB&&!IS_ADMIN;
const STORE_KEY='release_calendar_2026_v4';
let events=loadData();
function loadData(){ if(!ON_WEB){ try{ const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r); }catch(e){} }
  return SEED.map((e,i)=>({...e,id:'s'+i})); }
function saveData(){ if(READONLY) return; try{ localStorage.setItem(STORE_KEY,JSON.stringify(events)); }catch(e){} }

/* ── 변경 기록 (누가·언제·무엇을) ── */
let logList=loadLog();
function loadLog(){ if(!ON_WEB){ try{ const r=localStorage.getItem('rc_log_v1'); if(r) return JSON.parse(r); }catch(e){} } return []; }
function saveLog(){ if(READONLY) return; try{ localStorage.setItem('rc_log_v1',JSON.stringify(logList.slice(-100))); }catch(e){} }
function getNick(){ let n=localStorage.getItem('rc_nick');
  if(!n){ n=(prompt('변경 기록에 표시할 이름/닉네임을 입력하세요 (팀원 모두에게 보입니다)')||'').trim()||'익명';
    localStorage.setItem('rc_nick',n); } return n; }
function addLog(act,item){ logList.push({t:new Date().toISOString(),who:getNick(),act,item}); saveLog(); }

let curYear=2026, curMonth=NOW.getFullYear()===2026?NOW.getMonth():6;
let view='cal', searchTerm='', includeDone=true;
try{ const t=localStorage.getItem('rc_includeDone'); if(t!==null) includeDone=t==='1'; }catch(e){}

/* ============================================================
   필터
   ============================================================ */
function passFilter(e){
  if(!includeDone && e.status==='done') return false;
  const a=document.getElementById('artistFilter').value, l=document.getElementById('labelFilter').value;
  if(a&&e.artist!==a) return false; if(l&&e.label!==l) return false;
  if(searchTerm){ const t=(e.artist+' '+e.title+' '+(e.label||'')+' '+(e.note||'')+' '+(e.wish||'')+' '+(e.memo||'')).toLowerCase();
    if(!t.includes(searchTerm)) return false; }
  return true;
}
const dated=()=>events.filter(e=>!e.tbd&&passFilter(e));
const tbdEv=()=>events.filter(e=>e.tbd&&passFilter(e));
const allDated=()=>events.filter(e=>!e.tbd);

/* ============================================================
   렌더링 총괄
   ============================================================ */
function render(){
  renderHero(); renderMonthTabs(); renderFlow(); renderTbd(); renderLog();
  document.getElementById('ymLabel').textContent=`${curYear}년 ${curMonth+1}월`;
  document.getElementById('countNote').textContent=`${dated().length+tbdEv().length}건 표시`;
  document.getElementById('calWrap').classList.toggle('hide',view!=='cal');
  document.getElementById('listWrap').classList.toggle('hide',view!=='list');
  document.getElementById('briefWrap').classList.toggle('hide',view!=='brief');
  document.getElementById('flowSection').classList.toggle('hide',view==='brief');
  ['brief','cal','list'].forEach(v=>document.getElementById('tab-'+v).classList.toggle('active',view===v));
  if(view==='cal') renderCalendar(); else if(view==='list') renderList(); else renderBrief();
}

function renderHero(){
  const w=['일','월','화','수','목','금','토'];
  document.getElementById('todayLine').textContent=`${NOW.getFullYear()}년 ${NOW.getMonth()+1}월 ${NOW.getDate()}일 ${w[NOW.getDay()]} · 공동 편집`;
  // 다음 발매
  const t=todayStr();
  const up=allDated().filter(e=>e.date>=t&&e.status!=='done').sort((a,b)=>a.date===b.date?(a.time||'').localeCompare(b.time||''):a.date.localeCompare(b.date));
  if(up.length){ const n=up[0]; const d=new Date(n.date);
    document.getElementById('nextDate').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]})${n.time?' '+n.time:''}`;
    document.getElementById('nextSub').textContent=`${n.artist} · ${n.title}`;
  } else { document.getElementById('nextDate').textContent='예정 없음'; document.getElementById('nextSub').textContent=''; }
  // 연간 진행도
  const all=allDated(); const doneN=all.filter(e=>e.status==='done').length;
  const pct=all.length?Math.round(doneN/all.length*100):0;
  document.getElementById('goalNum').textContent=`${doneN}/${all.length}`;
  document.getElementById('goalPct').textContent=pct+'%';
  document.getElementById('goalBar').style.width=pct+'%';
  const c={fix:0,plan:0,hold:0}; events.forEach(e=>{ if(e.status!=='done'&&c[e.status]!==undefined)c[e.status]++; });
  document.getElementById('goalDots').innerHTML=
    `<span><span class="dt" style="background:var(--s-fix)"></span>확정 <b>${c.fix}</b></span>`+
    `<span><span class="dt" style="background:var(--s-plan)"></span>준비중 <b>${c.plan}</b></span>`+
    `<span><span class="dt" style="background:var(--s-hold)"></span>보류·미정 <b>${c.hold}</b></span>`;
  // 토글
  document.getElementById('doneSwitch').classList.toggle('on',includeDone);
  document.getElementById('doneSub').textContent=includeDone?`완료 ${doneN}건 표시 중`:`완료 ${doneN}건 숨김`;
}

function renderMonthTabs(){
  const counts={}; allDated().forEach(e=>{ const m=parseInt(e.date.slice(5,7)); counts[m]=(counts[m]||0)+1; });
  document.getElementById('monthTabs').innerHTML=Array.from({length:12},(_,i)=>{
    const mo=i+1,c=counts[mo]||0;
    return `<button class="month-tab ${curMonth===i?'active':''} ${c===0?'empty':''}" onclick="setMonth(${i})">${mo}월${c?` (${c}앨범)`:''}</button>`;
  }).join('');
}

/* 다가오는 5건 + 단계 진행 */
function renderFlow(){
  const t=todayStr();
  const up=dated().filter(e=>e.date>=t&&e.status!=='done')
    .sort((a,b)=>a.date===b.date?(a.time||'').localeCompare(b.time||''):a.date.localeCompare(b.date)).slice(0,5);
  document.getElementById('flowNote').textContent=`오늘 이후 ${up.length}건 · 단계 변경 시 자동 저장`;
  const strip=document.getElementById('flowStrip');
  if(!up.length){ strip.innerHTML='<div class="flow-empty">오늘 이후 예정된 발매가 없습니다.</div>'; return; }
  strip.innerHTML=up.map(e=>{
    const d=new Date(e.date); const st=e.stage||0;
    const opts=STAGES.map((s,i)=>`<option value="${i+1}" ${st===i+1?'selected':''}>${s}</option>`).join('');
    const stageUI=READONLY
      ? `<span class="flow-stage" style="cursor:default">${st?STAGES[st-1]:'기획 전'}</span>`
      : `<select class="flow-stage" onclick="event.stopPropagation()" onchange="setStage('${e.id}',this.value)">
          <option value="0" ${st===0?'selected':''}>기획 전</option>${opts}</select>`;
    return `<div class="flow-card" onclick="openModal('${e.id}')">
      <div class="flow-top"><span class="flow-date">${d.getMonth()+1}.${d.getDate()}</span>${stageUI}</div>
      <div class="flow-title">${e.star?'<span class="star">★</span> ':''}${esc(e.title)}</div>
      <div class="flow-sub">${esc(e.artist)}${e.label?' · '+esc(e.label):''}</div>
      <div class="seg-row">${STAGES.map((_,i)=>`<span class="seg ${i<st?'on':''}"></span>`).join('')}<span class="seg-num">${st}/6</span></div>
    </div>`;
  }).join('');
}
function setStage(id,v){ const e=events.find(x=>x.id===id); if(!e) return; e.stage=parseInt(v);
  addLog('단계 변경',`${e.artist} 〈${e.title}〉 → ${e.stage?STAGES[e.stage-1]:'기획 전'} (${e.stage}/6)`);
  saveData(); render(); autoSync(); }

function renderTbd(){
  const p=document.getElementById('tbdPanel'), it=tbdEv();
  if(!it.length||view==='brief'){ p.style.display='none'; return; }

function renderCalendar(){
  const g=document.getElementById('grid'); g.innerHTML='';
  const startDay=new Date(curYear,curMonth,1).getDay();
  const dim=new Date(curYear,curMonth+1,0).getDate(), pdim=new Date(curYear,curMonth,0).getDate();
  const by={}; dated().forEach(e=>{(by[e.date]=by[e.date]||[]).push(e);});
  Object.values(by).forEach(a=>a.sort((x,y)=>(x.time||'99').localeCompare(y.time||'99')));
  const cells=[];
  for(let i=startDay-1;i>=0;i--) cells.push({day:pdim-i,other:true});
  for(let d=1;d<=dim;d++) cells.push({day:d,other:false});
  while(cells.length<42) cells.push({day:cells.length-startDay-dim+1,other:true});
  cells.forEach((c,idx)=>{
    const div=document.createElement('div'); const dow=idx%7;
    const ds=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const holi=!c.other?HOLIDAYS[ds]:null;
    div.className='cell'+(c.other?' other':'')+(dow===0?' sun':'')+(dow===6?' sat':'');
    if(!c.other&&ds===todayStr()) div.classList.add('today');
    let h=`<div class="num"><span>${c.day}</span>${holi?`<span class="holi">${holi}</span>`:''}</div>`;
    if(!c.other) h+=`<div class="add-mini" onclick="openModal(null,'${ds}')">＋</div>`;
    if(!c.other&&by[ds]) by[ds].forEach(e=>{
      h+=`<div class="event ${STATUS[e.status].cls}" onclick="openModal('${e.id}')">
        <div class="ev-top">${e.time?`<span class="ev-time">${e.time}</span>`:''}<span class="ev-artist">${e.star?'<span class="star">★</span>':''}${esc(e.artist)}</span></div>
        <div class="ev-title">${esc(e.title)}${e.note?` · ${esc(e.note)}`:''}</div>
        <div class="ev-meta">${esc(e.label||'-')} · ${STATUS[e.status].label} · ${e.stage||0}/6</div></div>`;
    });
    div.innerHTML=h; g.appendChild(div);
  });
}

const SYNC_REPO_API='https://api.github.com/repos/WITHDOKO/release-calendar-2026/contents/data.json';
const pill=t=>{ document.getElementById('syncStatus').textContent=t; };

async function syncToPublic(silent=false){
  let tk=localStorage.getItem('gh_sync_token');
  if(!tk){
    if(silent){ pill('⚠ 공개 반영 버튼으로 최초 1회 연결 필요'); return; }
    tk=prompt('GitHub 토큰(ghp_로 시작)을 입력하세요.\n최초 1회만 입력하면 저장되고, 이후에는 수정할 때마다 자동으로 공개 링크에 반영됩니다.');
    if(!tk) return; tk=tk.trim(); localStorage.setItem('gh_sync_token',tk);
  }
  const h={'Authorization':'Bearer '+tk,'Accept':'application/vnd.github+json'};
  pill('공개 링크 반영 중…');
  try{
    let sha=null;
    const g=await fetch(SYNC_REPO_API+'?ref=main',{headers:h,cache:'no-store'});
    if(g.ok){ sha=(await g.json()).sha; }
    else if(g.status===401||g.status===403){ localStorage.removeItem('gh_sync_token'); pill('⚠ 토큰 만료 · 공개 반영 버튼으로 재연결');
      if(!silent) alert('토큰이 유효하지 않습니다.\n버튼을 다시 눌러 새 토큰을 입력해주세요.'); return; }
    const clean=events.map(({id,...rest})=>rest);
    const payload={events:clean, log:logList.slice(-100)};
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,1))));
    const body={message:'일정 업데이트 '+new Date().toISOString().slice(0,16).replace('T',' '),content};
    if(sha) body.sha=sha;
    const r=await fetch(SYNC_REPO_API,{method:'PUT',headers:h,body:JSON.stringify(body)});
    if(r.ok){ pill('✅ 공개 반영 완료 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
      if(!silent) alert('✅ 공개 링크에 반영했습니다!\n약 1~2분 후 팀원 화면에 자동 적용됩니다.'); }
    else if(r.status===401||r.status===403){ localStorage.removeItem('gh_sync_token'); pill('⚠ 토큰 만료 · 공개 반영 버튼으로 재연결');
      if(!silent) alert('토큰 권한 오류입니다.\n버튼을 다시 눌러 새 토큰을 입력해주세요.'); }
    else{ pill('⚠ 반영 실패 · 공개 반영 버튼으로 재시도'); if(!silent) alert('반영 실패 (오류 '+r.status+')'); }
  }catch(e){ pill('⚠ 오프라인 · 연결되면 공개 반영 버튼으로 재시도'); if(!silent) alert('네트워크 오류: '+e.message); }
}

(async function pullRemote(){
  try{
    const url=(ON_WEB?'data.json':PUB_URL+'data.json')+'?ts='+Date.now();
    const r=await fetch(url,{cache:'no-store'}); if(!r.ok) return;
    const d=await r.json();
    const evs=Array.isArray(d)?d:(d.events||[]);
    const rlog=Array.isArray(d)?[]:(d.log||[]);
    const lastT=a=>a.length?a[a.length-1].t:'';
    if(!evs.length) return;
    if(READONLY || lastT(rlog)>=lastT(logList)){
      events=evs.map((e,i)=>({...e,id:'r'+i})); logList=rlog;
      saveData(); saveLog(); buildDropdowns(); render();
    }
  }catch(e){}
})();

/* ── 관리자 페이지 인증 게이트 ── */
if(IS_ADMIN&&ON_WEB&&!localStorage.getItem('gh_sync_token')){
  const gate=document.createElement('div');
  gate.className='overlay open'; gate.id='adminGate'; gate.style.zIndex='200';
  gate.innerHTML=`<div class="modal">

      ① 닉네임 입력 → ② 카카오 채널로 <b>권한 신청 전송</b> → ③ 대표 확인 후 답장으로 받은 <b>승인 코드</b>를 아래에 입력</p>
    <div class="field"><label>① 닉네임 (변경 기록에 표시됩니다)</label><input type="text" id="gateNick" placeholder="예) 매니저 김OO"></div>
    <div class="field"><label>② 권한 신청 — 버튼을 누르면 신청 문구가 복사되고 도코AI 채널 챗이 열립니다</label>
      <button class="btn" style="width:100%;justify-content:center;background:#FEE500;border-color:#FEE500;color:#191919;font-weight:800" onclick="gateCopyReq()">💬 카카오 채널에서 권한 신청하기</button>
      <p style="font-size:11px;color:var(--text-mute);margin-top:6px">열린 채널 챗에 붙여넣기(Ctrl+V) 후 전송 → 대표가 확인하고 승인 코드를 직접 답장드립니다</p></div>
    <div class="field"><label>③ 승인 코드 입력 (대표가 답장으로 보내준 코드)</label><input type="text" id="gateCode" placeholder="예) 허용0000"></div>
    <div class="modal-actions">

const KAKAO_REQ_URL='http://pf.kakao.com/_DuIxnX/chat';
function gateCopyReq(){
  const n=(document.getElementById('gateNick').value||'').trim();
  if(!n){ alert('닉네임을 먼저 입력해주세요.'); return; }

    .catch(()=>{ prompt('아래 문구를 복사한 뒤, 확인을 누르면 채널 챗이 열립니다',msg); go(); });
}
/* 승인 코드로 잠긴 열쇠 풀기 (AES-256-GCM · 코드 없이는 복호화 불가) */
const ENC={salt:'DnRe/uAw9mNDFeAZdPY9cA==',iv:'1oxicVr4SqwHyEyO',ct:'2uozX75VEN6txYUHyzg5JC3G73diShSHre9WGaV7R6qdwnNuM22zdezNdSwNAdpHFj+RNYS2JVA='};
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlockToken(pass){
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:120000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
    return new TextDecoder().decode(pt);
  }catch(e){ return null; }
}
async function gateSubmit(){
  const n=(document.getElementById('gateNick').value||'').trim();
  const c=(document.getElementById('gateCode').value||'').trim();
  if(!n){ alert('닉네임을 입력해주세요.'); return; }
  if(!c){ alert('승인 코드를 입력해주세요.'); return; }
  let tk=null;
  if(c.startsWith('ghp_')||c.startsWith('github_pat_')) tk=c;        // 원본 코드 직접 입력도 허용
  else tk=await unlockToken(c.replace(/\s/g,''));                     // 승인 코드(예: 허용0000)
  if(!tk){ alert('승인 코드가 올바르지 않습니다.\n대표에게 받은 코드를 다시 확인해주세요.'); return; }
  localStorage.setItem('rc_nick',n); localStorage.setItem('gh_sync_token',tk);
  addLog('관리자 참여',n+' 님이 편집 권한으로 접속');
  const g=document.getElementById('adminGate'); if(g) g.remove();
  pill('자동 반영 연결됨 · '+n); syncToPublic(true);
}
